services:
  postgres:
    image: postgres:18.3-bookworm@sha256:7c7922bce7110e690e5a48d241e7fedd0daf6b4622dddf2f41f659a71ee445c4
    container_name: eli-coach-platform-test-postgres
    restart: unless-stopped
    env_file:
      - ${POSTGRES_ENV_FILE:-/srv/postgres/eli-coach-platform.env}
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - /srv/postgres/data/eli-coach-platform:/var/lib/postgresql/data
    networks:
      - internal

networks:
  internal:
    name: eli-coach-platform-test-internal
