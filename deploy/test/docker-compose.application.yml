services:
  platform:
    image: ${PLATFORM_IMAGE}
    container_name: eli-coach-platform-test-platform-${STACK_COLOR}
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-/srv/apps/eli-coach-platform/.env}
    environment:
      APP_NAME: eli-coach-platform
      APP_BASE_PATH: /eli-coach-platform
      APP_HEALTHCHECK_PATH: /eli-coach-platform/readyz
      ENVIRONMENT: test
      PORT: "3000"
    labels:
      logging: promtail
      env: test
      app: eli-coach-platform
      service: platform
      host: ${HOST_LABEL}
    networks:
      - edge
      - internal

  design-reference:
    image: ${DESIGN_REFERENCE_IMAGE}
    container_name: eli-coach-platform-test-design-reference-${STACK_COLOR}
    restart: unless-stopped
    labels:
      logging: promtail
      env: test
      app: eli-coach-platform
      service: design-reference
      host: ${HOST_LABEL}
    networks:
      - edge

networks:
  edge:
    external: true
    name: edge_default
  internal:
    external: true
    name: eli-coach-platform-test-internal
