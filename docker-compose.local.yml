services:
  postgres:
    image: postgres:17.6
    container_name: eli-coach-platform-local-postgres
    restart: unless-stopped
    env_file:
      - ${LOCAL_POSTGRES_ENV_FILE:-.env.postgres}
    ports:
      - "${LOCAL_POSTGRES_PORT:-5432}:5432"
    volumes:
      - eli-coach-platform-local-postgres:/var/lib/postgresql/data
      - ./packages/db/scripts/docker-init-bootstrap.sh:/docker-entrypoint-initdb.d/01-bootstrap.sh:ro
      - ./packages/db/sql/bootstrap.sql:/docker-entrypoint-initdb.d/bootstrap.sql:ro

volumes:
  eli-coach-platform-local-postgres:
