name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PNPM_VERSION: 10.33.0
  POSTGRES_RUNTIME_IMAGE: postgres:17.9@sha256:b994732fcf33f73776c65d3a5bf1f80c00120ba5007e8ab90307b1a743c1fc16
  TEST_PLATFORM_BASE_PATH: /eli-coach-platform

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build workspace
        run: pnpm build

      - name: Build design reference app
        working-directory: designs/react-reference-app
        run: |
          npm ci
          npm run build

  build_and_push:
    name: Build and Push Images
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      platform_image: ${{ steps.image_refs.outputs.platform_image }}
      design_reference_image: ${{ steps.image_refs.outputs.design_reference_image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Resolve GHCR owner path
        id: owner
        shell: bash
        run: |
          owner_lc="$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          echo "owner_lc=${owner_lc}" >> "$GITHUB_OUTPUT"
          echo "image_prefix=ghcr.io/${owner_lc}/eli-coach-platform" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build and push platform image
        id: build_platform
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: docker/Dockerfile.react-router
          pull: true
          push: true
          provenance: false
          sbom: false
          platforms: linux/amd64
          tags: ${{ steps.owner.outputs.image_prefix }}-platform:${{ github.sha }}
          build-args: |
            APP_DIR=apps/platform
            APP_PACKAGE=@eli-coach-platform/platform
            APP_BASE_PATH=${{ env.TEST_PLATFORM_BASE_PATH }}/
            APP_HEALTHCHECK_PATH=${{ env.TEST_PLATFORM_BASE_PATH }}/readyz
          cache-from: type=gha,scope=platform
          cache-to: type=gha,mode=max,scope=platform

      - name: Build and push design reference image
        id: build_design_reference
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: docker/Dockerfile.design-reference
          pull: true
          push: true
          provenance: false
          sbom: false
          platforms: linux/amd64
          tags: ${{ steps.owner.outputs.image_prefix }}-design-reference:${{ github.sha }}
          build-args: |
            VITE_BASE_PATH=${{ env.TEST_PLATFORM_BASE_PATH }}/design-reference/
          cache-from: type=gha,scope=design-reference
          cache-to: type=gha,mode=max,scope=design-reference

      - name: Collect image refs
        id: image_refs
        shell: bash
        env:
          IMAGE_PREFIX: ${{ steps.owner.outputs.image_prefix }}
        run: |
          set -euo pipefail

          platform_image="${IMAGE_PREFIX}-platform@${{ steps.build_platform.outputs.digest }}"
          design_reference_image="${IMAGE_PREFIX}-design-reference@${{ steps.build_design_reference.outputs.digest }}"

          cat > image-refs.json <<EOF
          {
            "platform": "${platform_image}",
            "designReference": "${design_reference_image}"
          }
          EOF

          {
            echo "platform_image=${platform_image}"
            echo "design_reference_image=${design_reference_image}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload image refs artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: image-refs-${{ github.sha }}
          path: image-refs.json

  security_gate:
    name: Security Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: build_and_push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        image_target:
          - platform
          - design-reference
          - postgres-runtime
    steps:
      - name: Resolve image ref
        id: image
        shell: bash
        env:
          IMAGE_TARGET: ${{ matrix.image_target }}
          PLATFORM_IMAGE: ${{ needs.build_and_push.outputs.platform_image }}
          DESIGN_REFERENCE_IMAGE: ${{ needs.build_and_push.outputs.design_reference_image }}
          POSTGRES_RUNTIME_IMAGE: ${{ env.POSTGRES_RUNTIME_IMAGE }}
        run: |
          set -euo pipefail

          case "${IMAGE_TARGET}" in
            platform)
              image_ref="${PLATFORM_IMAGE}"
              scanners="vuln"
              vuln_type="os,library"
              ;;
            design-reference)
              image_ref="${DESIGN_REFERENCE_IMAGE}"
              scanners="vuln"
              vuln_type="os,library"
              ;;
            postgres-runtime)
              image_ref="${POSTGRES_RUNTIME_IMAGE}"
              scanners="vuln"
              vuln_type="os"
              ;;
            *)
              echo "unsupported image target: ${IMAGE_TARGET}"
              exit 1
              ;;
          esac

          {
            echo "image_ref=${image_ref}"
            echo "scanners=${scanners}"
            echo "vuln_type=${vuln_type}"
          } >> "$GITHUB_OUTPUT"

      - name: Vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.image.outputs.image_ref }}
          scanners: ${{ steps.image.outputs.scanners }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          vuln-type: ${{ steps.image.outputs.vuln_type }}
        env:
          TRIVY_USERNAME: ${{ secrets.GHCR_PULL_USERNAME || github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GHCR_PULL_TOKEN || secrets.GITHUB_TOKEN }}

  deploy_test:
    name: Deploy to TEST
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs:
      - build_and_push
      - security_gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    concurrency:
      group: deploy-test
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Resolve target config
        id: target
        shell: bash
        env:
          TEST_SSH_KNOWN_HOSTS: ${{ secrets.TEST_SSH_KNOWN_HOSTS }}
          TEST_NODE_HOSTNAME: ${{ vars.TEST_NODE_HOSTNAME || 'susanoo-test.longhair-eagle.ts.net' }}
          TEST_EDGE_HOSTNAME: ${{ vars.TEST_EDGE_HOSTNAME || secrets.TEST_EDGE_HOSTNAME }}
        run: |
          set -euo pipefail

          if [[ -z "${TEST_NODE_HOSTNAME}" || -z "${TEST_SSH_KNOWN_HOSTS}" || -z "${TEST_EDGE_HOSTNAME}" ]]; then
            echo "Missing TEST deploy configuration"
            exit 1
          fi

          echo "node_hostname=${TEST_NODE_HOSTNAME%.}" >> "$GITHUB_OUTPUT"
          printf "ssh_known_hosts<<EOF\n%s\nEOF\n" "${TEST_SSH_KNOWN_HOSTS}" >> "$GITHUB_OUTPUT"
          echo "edge_hostname=${TEST_EDGE_HOSTNAME}" >> "$GITHUB_OUTPUT"

      - name: Connect to Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          hostname: gha-eli-coach-platform-ci
          tags: tag:ci-app-deploy
          ping: ${{ steps.target.outputs.node_hostname }}

      - name: Resolve TEST host over Tailscale
        id: ssh
        shell: bash
        env:
          NODE_HOSTNAME: ${{ steps.target.outputs.node_hostname }}
        run: |
          set -euo pipefail

          node_hostname="${NODE_HOSTNAME%.}"
          short_hostname="${node_hostname%%.*}"
          ssh_ip="$(tailscale status --json | jq -r --arg fqdn "${node_hostname}." --arg raw "$node_hostname" --arg host "$short_hostname" '
            [(.Peer // [])[] | select(.DNSName == $fqdn or .DNSName == $raw or .HostName == $host) | .TailscaleIPs[0]][0] // empty
          ')"

          if [[ -z "${ssh_ip}" ]]; then
            echo "Could not resolve TEST node ${node_hostname} to a Tailscale IP"
            exit 1
          fi

          echo "ssh_target=root@${ssh_ip}" >> "$GITHUB_OUTPUT"
          echo "host_key_alias=${node_hostname}" >> "$GITHUB_OUTPUT"

      - name: Write pinned SSH known_hosts
        run: |
          set -euo pipefail
          printf '%s\n' "${{ steps.target.outputs.ssh_known_hosts }}" > /tmp/known_hosts
          chmod 600 /tmp/known_hosts

      - name: Install deploy assets on TEST host
        env:
          SSH_TARGET: ${{ steps.ssh.outputs.ssh_target }}
          SSH_HOST_KEY_ALIAS: ${{ steps.ssh.outputs.host_key_alias }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          remote_command=$(cat <<EOF
          set -euo pipefail
          base_url="https://raw.githubusercontent.com/EduardValentin/eli-coach-platform/${GITHUB_SHA}"
          sudo install -d -m 0755 /srv/apps/eli-coach-platform /srv/apps/eli-coach-platform/deploy/test /srv/apps/eli-coach-platform/scripts/deploy
          curl -fsSL "\${base_url}/scripts/deploy/deploy_test.sh" | sudo tee /srv/apps/eli-coach-platform/scripts/deploy/deploy_test.sh >/dev/null
          sudo chmod 0755 /srv/apps/eli-coach-platform/scripts/deploy/deploy_test.sh
          curl -fsSL "\${base_url}/scripts/deploy/run_test_migrations.sh" | sudo tee /srv/apps/eli-coach-platform/scripts/deploy/run_test_migrations.sh >/dev/null
          sudo chmod 0755 /srv/apps/eli-coach-platform/scripts/deploy/run_test_migrations.sh
          curl -fsSL "\${base_url}/deploy/test/docker-compose.application.yml" | sudo tee /srv/apps/eli-coach-platform/deploy/test/docker-compose.application.yml >/dev/null
          curl -fsSL "\${base_url}/deploy/test/docker-compose.infrastructure.yml" | sudo tee /srv/apps/eli-coach-platform/deploy/test/docker-compose.infrastructure.yml >/dev/null
          curl -fsSL "\${base_url}/deploy/test/traefik-dynamic.yml.template" | sudo tee /srv/apps/eli-coach-platform/deploy/test/traefik-dynamic.yml.template >/dev/null
          EOF
          )

          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=/tmp/known_hosts -o HostKeyAlias="$SSH_HOST_KEY_ALIAS" -o ProxyCommand='tailscale nc %h %p' "$SSH_TARGET" "$remote_command"

      - name: Verify runtime env files exist on TEST
        env:
          SSH_TARGET: ${{ steps.ssh.outputs.ssh_target }}
          SSH_HOST_KEY_ALIAS: ${{ steps.ssh.outputs.host_key_alias }}
        run: |
          set -euo pipefail

          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=/tmp/known_hosts -o HostKeyAlias="$SSH_HOST_KEY_ALIAS" -o ProxyCommand='tailscale nc %h %p' "$SSH_TARGET" "sudo test -s /srv/apps/eli-coach-platform/.env && sudo test -s /srv/postgres/eli-coach-platform.env"

      - name: Deploy image set to TEST
        env:
          SSH_TARGET: ${{ steps.ssh.outputs.ssh_target }}
          SSH_HOST_KEY_ALIAS: ${{ steps.ssh.outputs.host_key_alias }}
          EDGE_HOSTNAME: ${{ steps.target.outputs.edge_hostname }}
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          PLATFORM_IMAGE: ${{ needs.build_and_push.outputs.platform_image }}
          DESIGN_REFERENCE_IMAGE: ${{ needs.build_and_push.outputs.design_reference_image }}
        run: |
          set -euo pipefail

          if [[ -z "${GHCR_PULL_USERNAME}" || -z "${GHCR_PULL_TOKEN}" ]]; then
            echo "Missing GHCR pull credentials for remote deploy"
            exit 1
          fi

          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=/tmp/known_hosts -o HostKeyAlias="$SSH_HOST_KEY_ALIAS" -o ProxyCommand='tailscale nc %h %p' "$SSH_TARGET" \
            "sudo EDGE_HOSTNAME='${EDGE_HOSTNAME}' HOST_LABEL='${EDGE_HOSTNAME}' GHCR_USERNAME='${GHCR_PULL_USERNAME}' GHCR_TOKEN='${GHCR_PULL_TOKEN}' PLATFORM_IMAGE='${PLATFORM_IMAGE}' DESIGN_REFERENCE_IMAGE='${DESIGN_REFERENCE_IMAGE}' bash /srv/apps/eli-coach-platform/scripts/deploy/deploy_test.sh"

      - name: Cleanup temporary known_hosts
        if: always()
        run: rm -f /tmp/known_hosts
